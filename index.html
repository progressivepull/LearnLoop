<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LearnLoop</title>

    <!-- Standard favicon -->
    <link rel="icon" href="./app/favicon_io/favicon.ico" sizes="any">

    <!-- PNG favicons -->
    <link rel="icon" type="image/png" sizes="16x16" href="./app/favicon_io/favicon-16x16.png">
    <link rel="icon" type="image/png" sizes="32x32" href="./app/favicon-32x32.png">

    <!-- Android Chrome -->
    <link rel="icon" type="image/png" sizes="192x192" href="./app/favicon_io/android-chrome-192x192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="./app/favicon_io/android-chrome-512x512.png">

    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" sizes="180x180" href="./app/favicon_ioapple-touch-icon.png">

    <!-- Web App Manifest -->
    <link rel="manifest" href="./app/favicon_iosite.webmanifest">


    <!-- LearnLoop Stylesheet -->
    <link href="./app/index.css" rel="stylesheet" />

    <!-- Bootstrap -->
    <link href="./app/bootstrap/bootstrap.min.css" rel="stylesheet">
    <script src="./app/bootstrap/bootstrap.bundle.min.js"></script>

    <!-- jQuery -->
    <script src="./app/jquery/jquery-4.0.0.min.js"></script>


    <!-- jQueryUI -->
    <link rel="stylesheet" href="./app/jquery-ui-1.14.2/jquery-ui.css">
    <script src="./app/jquery-ui-1.14.2/jquery-ui.min.js"></script>


    <!-- Prism -->
    <link href="./app/prism/prism.css" rel="stylesheet" />


</head>

<body>

    <div class="top-banner"></div>

    <div class=" content container mt-5">
        <div class="card shadow p-4">

            <button id="restartBtn" class="btn btn-primary mt-3"><b>Restart quiz Loop</b></button>
            <br>

            <div id="start-page">
                <!-- FILE INPUT -->
                <div id="fileInputDiv" class="mb-3">
                    <label class="form-label">Select Questions File</label>
                    <input type="file" id="dataFileInput" class="form-control" accept=".json">
                </div>

                <button id="startBtn" class="btn btn-primary mt-3"><b>Start Quiz Loop</b></button>
            </div>

            <div id="quiz-page">

                <!-- FILE INPUT -->
                <div id="quiz-title"></div>

                <!-- QUESTION NUMBER -->
	            <p id="questionNo" class="fw-bold mb-2 text-primary"></p>

                <!-- COUNTER -->
                <div id="questionCounter" class="fw-bold mb-2 text-primary"></div>

                <div id="progressbar"></div>
                <br>

                <!-- QUESTION DESCRIPTION  -->
                <p id="question-description"></p>

                <!-- QUESTION -->
                <p id="question"></p>

                <!-- CODE  -->
                <div id="prismDiv"></div>

                <!-- OPTIONS -->
                <div id="options" class="mt-3"></div>

                <button id="nextBtn" class="btn btn-success mt-3"><b>Next Question</b></button>
                <br>
	           <button id="openExplanationBtn" class="btn btn-info mt-3"><b>Explanation Link</b></button>
                <br>
	           <button id="openTermsBtn" class="btn btn-warning mt-3"><b>Terms Link</b></button>
            </div>

            <div id="result-page">

                    <!-- RESULT SUMMARY -->
                    <h4 id="result" class="mt-4"></h4>

            </div>

        </div>



        <div id="selectDataFileDialog">
            <p><b>Select the Data Input JSON File.</b></p>
        </div>

        <div id="selectOptionDialog">
            <p><b>Please select an option!</b></p>
        </div>


    </div>

    <footer>
        <div class="left">LearnLoop</div>
        <div class="right">© <span>4/18/2026</span></div>
    </footer>

    <!-- Prism -->
    <script src="./app/prism/prism.js"></script>
    <script src="./app/prism/prism-python.min.js"></script>
    <script src="./app/prism/prism-sql.min.js"></script>
    <script src="./app/prism/prism-java.min.js"></script>


    <script src="./app/app.js"></script>



</body>

</html>
